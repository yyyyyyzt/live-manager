<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>TRTC 极简 demo · 推流端（主播）</title>
  <script src="https://cdn.jsdelivr.net/npm/trtc-sdk-v5@latest"></script>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 880px; margin: 24px auto; padding: 0 16px; }
    label { display: block; margin-top: 12px; font-weight: 600; }
    input[type="text"], textarea { width: 100%; box-sizing: border-box; margin-top: 4px; }
    textarea { min-height: 72px; font-family: ui-monospace, monospace; }
    button { margin-top: 12px; margin-right: 8px; padding: 8px 14px; cursor: pointer; }
    #local { width: 100%; max-width: 640px; aspect-ratio: 16/9; background: #111; margin-top: 12px; }
    #log { white-space: pre-wrap; font-size: 12px; background: #f5f5f5; padding: 8px; max-height: 160px; overflow: auto; }
    .hint { color: #555; font-size: 13px; margin-top: 8px; }
    code { background: #eee; padding: 2px 6px; }
  </style>
</head>
<body>
  <h1>推流端（主播）</h1>
  <p class="hint">
    TRTC 房间由「进房」隐式创建：只需约定同一个 <code>strRoomId</code>。
    下方「房间自定义信息」为纯前端约定（JSON），用于生成观看端链接并在两侧展示；并非云端房间属性 API。
    请用本地静态服务器打开本目录（例如 <code>python3 -m http.server 8765</code>），以便生成可点击的观看端链接。
  </p>

  <label>strRoomId（字符串房间号，与观看端一致）</label>
  <input id="roomId" type="text" value="demo_live_room_6f54" />

  <label>房间自定义信息（JSON，将出现在观看端链接与页面解析结果中）</label>
  <textarea id="meta">{"title":"演示直播间","tag":"minimal-demo"}</textarea>

  <div>
    <button id="btnGo" type="button">创建房间并发图片流（Canvas）</button>
    <button id="btnLeave" type="button" disabled>退房</button>
  </div>

  <label>本地预览</label>
  <div id="local"></div>

  <label>自定义控制消息（主播专属 <code>sendCustomMessage</code>，房间内广播）</label>
  <div>
    <input id="cmdId" type="number" min="1" max="10" value="1" style="width:64px" />
    <input id="cmdText" type="text" placeholder="文本内容（≤1KB）" style="width:60%" value="hello-from-anchor" />
    <button id="btnSend" type="button" disabled>发送</button>
  </div>

  <label>分享给观看端的链接（含房间号与自定义信息）</label>
  <input id="share" type="text" readonly />

  <label>事件日志</label>
  <div id="log"></div>

  <script>
    const SDK_APP_ID = 1600134769;
    const USER_ID = 'anchor_demo_6f54';
    const USER_SIG =
      'eJwtjF0LgjAYRv-Le1vo65ybDrqJ6BsJi6wrsTZ1hTqWRBD990C9POc8PF847Y-OW1kQQByEac9aqqbThe513tyr1mZS1W3GioCOm5d85sZoCcJjiJ5POYuG0ulagfA455SEyIPBqo-RVoFgSEPE8UOXIIDd4iSmEoN0TUw5r3ape4it-5hck2ARrZYV2Zb*5bxxOc7g9wcv5TME';

    const logEl = document.getElementById('log');
    function log(msg) {
      logEl.textContent += msg + '\n';
      logEl.scrollTop = logEl.scrollHeight;
    }

    let trtc;
    let canvas;
    let rafId;

    function buildViewerUrl(strRoomId, metaObj) {
      const u = new URL('viewer.html', window.location.href);
      u.searchParams.set('strRoomId', strRoomId);
      u.searchParams.set('meta', encodeURIComponent(JSON.stringify(metaObj)));
      return u.toString();
    }

    function startCanvasAnimation(roomMeta) {
      canvas = document.createElement('canvas');
      canvas.width = 640;
      canvas.height = 360;
      const ctx = canvas.getContext('2d');
      let t = 0;
      function frame() {
        t += 0.02;
        ctx.fillStyle = '#16213e';
        ctx.fillRect(0, 0, 640, 360);
        ctx.fillStyle = '#e94560';
        ctx.beginPath();
        ctx.arc(320 + Math.sin(t) * 120, 180 + Math.cos(t * 1.3) * 40, 48, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = '#eaeaea';
        ctx.font = 'bold 22px sans-serif';
        ctx.fillText(roomMeta.title || 'TRTC Demo', 24, 48);
        ctx.font = '14px sans-serif';
        ctx.fillText(JSON.stringify(roomMeta), 24, 78);
        ctx.fillText('Canvas → captureStream → 推流', 24, 330);
        rafId = requestAnimationFrame(frame);
      }
      frame();
      return canvas.captureStream(15);
    }

    document.getElementById('btnGo').onclick = async () => {
      const strRoomId = document.getElementById('roomId').value.trim();
      let roomMeta;
      try {
        roomMeta = JSON.parse(document.getElementById('meta').value || '{}');
      } catch (e) {
        alert('自定义信息须为合法 JSON');
        return;
      }
      if (!strRoomId) {
        alert('请填写 strRoomId');
        return;
      }

      document.getElementById('share').value = buildViewerUrl(strRoomId, roomMeta);

      trtc = TRTC.create();
      trtc.on(TRTC.EVENT.ERROR, (err) => log('ERROR ' + JSON.stringify(err)));

      try {
        await trtc.enterRoom({
          sdkAppId: SDK_APP_ID,
          userId: USER_ID,
          userSig: USER_SIG,
          strRoomId,
          scene: TRTC.TYPE.SCENE_LIVE,
          role: TRTC.TYPE.ROLE_ANCHOR,
        });
        log('进房成功 strRoomId=' + strRoomId);
      } catch (e) {
        log('进房失败 ' + e);
        return;
      }

      const vs = startCanvasAnimation(roomMeta);
      const videoTrack = vs.getVideoTracks()[0];
      try {
        await trtc.startLocalVideo({
          view: 'local',
          option: { videoTrack, profile: '480p_2' },
        });
        log('已开始推送 Canvas 图片流');
      } catch (e) {
        log('startLocalVideo 失败 ' + e);
        await trtc.exitRoom();
        trtc.destroy();
        return;
      }

      document.getElementById('btnGo').disabled = true;
      document.getElementById('btnLeave').disabled = false;
      document.getElementById('btnSend').disabled = false;
    };

    document.getElementById('btnSend').onclick = () => {
      const cmdId = parseInt(document.getElementById('cmdId').value, 10);
      if (cmdId < 1 || cmdId > 10 || Number.isNaN(cmdId)) {
        alert('cmdId 必须是 1–10 的整数');
        return;
      }
      const text = document.getElementById('cmdText').value || '';
      const data = new TextEncoder().encode(text).buffer;
      try {
        trtc.sendCustomMessage({ cmdId, data });
        log('已发送 custom cmdId=' + cmdId + ' len=' + data.byteLength);
      } catch (e) {
        log('sendCustomMessage 失败 ' + e);
      }
    };

    document.getElementById('btnLeave').onclick = async () => {
      document.getElementById('btnSend').disabled = true;
      if (rafId) cancelAnimationFrame(rafId);
      try {
        await trtc.exitRoom();
      } catch (e) {
        log('exitRoom ' + e);
      }
      trtc.destroy();
      trtc = null;
      document.getElementById('btnGo').disabled = false;
      document.getElementById('btnLeave').disabled = true;
      log('已退房');
    };
  </script>
</body>
</html>
